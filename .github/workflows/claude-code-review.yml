name: Claude Code Review

on:
  pull_request:
    types:
      - opened           # Non-draft PR opened
      - ready_for_review  # Draft PR marked ready
      - unlabeled        # Re-review when 'claude-reviewed' label is removed

jobs:
  claude-review:
    # Run on opened/ready_for_review (if not draft), or on unlabeled only if
    # the removed label is 'claude-reviewed' (manual re-review trigger).
    # Skip all bot PRs (Renovate, etc.) — user.type is 'Bot' for
    # GitHub App accounts, 'User' for humans.
    if: |
      github.event.pull_request.user.type != 'Bot' &&
      github.event.pull_request.draft == false &&
      (github.event.action != 'unlabeled' || github.event.label.name == 'claude-reviewed')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Get Vault secrets
        id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@a53fc80bc30b0a16a262520465db899fa3af08b7 # get-vault-secrets/v1.3.2
        with:
          repo_secrets: |
            ANTHROPIC_API_KEY=anthropic-api-key:api_key

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@dde2242db6af13460b916652159b6ba19a598f30 # v1
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          use_sticky_comment: true
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review --comment ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          claude_args: '--allowedTools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh pr review:*),mcp__github_inline_comment__create_inline_comment"'

      - name: Add claude-reviewed label
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr edit "${{ github.event.pull_request.number }}" --add-label claude-reviewed
