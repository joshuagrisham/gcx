min_version = "2024.1.0"

[tools]
go = "1.26"
golangci-lint = "2.12.2"
goreleaser = "2.13.3"
python = "3.12"
uv = "latest"

# =============================================================================
# GENERAL
# =============================================================================

[tasks.all]
description = "Validate skills, lint, test, build, and generate docs"
depends = ["validate-skills", "lint", "tests", "build", "docs"]

# =============================================================================
# DEVELOPMENT
# =============================================================================

[tasks.lint]
description = "Lint the codebase with golangci-lint"
run = "golangci-lint run -c .golangci.yaml"

[tasks."validate-skills"]
description = "Validate bundled skill front matter"
run = "go run ./scripts/validate-skills"

[tasks.tests]
description = "Run all tests (CLI + linter rules)"
depends = ["tests:cli", "tests:linter"]

[tasks."tests:cli"]
description = "Run CLI tests"
run = "go test ./..."

[tasks."tests:linter"]
description = "Run linter rules tests"
run = "go run ./cmd/gcx/ dev lint test ./internal/linter/bundle/gcx/"

[tasks.build]
description = "Build binary to bin/gcx"
run = """
#!/usr/bin/env bash
set -euo pipefail
GIT_REVISION="${GIT_REVISION:-$(git rev-parse --short HEAD)}"
GIT_VERSION="${GIT_VERSION:-$(git describe --tags --exact-match 2>/dev/null || echo "")}"
BUILD_DATE="${BUILD_DATE:-$(date -u +"%Y-%m-%dT%H:%M:%SZ")}"
go build \
    -buildvcs=false \
    -ldflags="-X main.version=${GIT_VERSION} -X main.commit=${GIT_REVISION} -X main.date=${BUILD_DATE}" \
    -o bin/gcx \
    ./cmd/gcx
"""

[tasks.install]
description = "Build and install binary to $GOPATH/bin"
depends = ["build"]
run = """
#!/usr/bin/env bash
set -euo pipefail
GOPATH="${GOPATH:-$(go env GOPATH)}"
[ -n "$GOPATH" ] || { echo "GOPATH is not defined and 'go env GOPATH' returned empty"; exit 1; }
mkdir -p "$GOPATH/bin"
cp bin/gcx "$GOPATH/bin/gcx"
if [ "$(uname)" = "Darwin" ]; then
    codesign -s - "$GOPATH/bin/gcx"
fi
"""

[tasks.deps]
description = "Install Go and Python dependencies"
run = """
#!/usr/bin/env bash
set -euo pipefail
go mod vendor
uv pip install --system -q -r requirements.txt
"""

[tasks.clean]
description = "Remove build artifacts"
run = "rm -rf bin vendor .venv"

[tasks.setup]
description = "Set up local development environment (commit template, etc.)"
run = """
git config commit.template .gitmessage
echo "Git commit template configured"
"""

[tasks.tag]
description = "Bump version, generate changelog, tag, and push. Usage: mise run tag -- <major|minor|patch>"
run = "./scripts/tag.sh"

# =============================================================================
# DOCUMENTATION
# =============================================================================

[tasks.docs]
description = "Generate reference docs and build mkdocs site"
depends = ["reference"]
run = "mkdocs build -f mkdocs.yml -d ./build/documentation"

[tasks.reference]
description = "Regenerate all reference documentation"
depends = ["reference:cli", "reference:env-var", "reference:config", "reference:linter-rules"]

[tasks."reference-drift"]
description = "Check for drift in all generated reference docs"
depends = ["reference-drift:cli", "reference-drift:env-var", "reference-drift:config", "reference-drift:linter-rules"]

[tasks."reference:cli"]
description = "Generate CLI reference docs"
run = """
#!/usr/bin/env bash
set -euo pipefail
rm -rf ./docs/reference/cli
GCX_AGENT_MODE=false CGO_ENABLED=0 go run scripts/cmd-reference/*.go "./docs/reference/cli"
"""

[tasks."reference:env-var"]
description = "Generate environment variables reference"
run = """
#!/usr/bin/env bash
set -euo pipefail
rm -rf ./docs/reference/environment-variables
CGO_ENABLED=0 go run scripts/env-vars-reference/*.go "./docs/reference/environment-variables"
"""

[tasks."reference:config"]
description = "Generate configuration reference"
run = """
#!/usr/bin/env bash
set -euo pipefail
rm -rf ./docs/reference/configuration
CGO_ENABLED=0 go run scripts/config-reference/*.go "./docs/reference/configuration"
"""

[tasks."reference:linter-rules"]
description = "Generate linter rules reference"
run = """
#!/usr/bin/env bash
set -euo pipefail
rm ./docs/reference/linter-rules/index.md
CGO_ENABLED=0 go run scripts/linter-rules-reference/*.go "./docs/reference/linter-rules"
"""

[tasks."reference-drift:cli"]
description = "Check for drift in generated CLI reference"
depends = ["reference:cli"]
run = """
#!/usr/bin/env bash
set -euo pipefail
if ! git diff --exit-code --quiet HEAD ./docs/reference/cli/ ; then
    echo "Drift detected in the generated CLI reference."
    echo "Run 'mise run reference:cli' and commit the modified files."
    exit 1
fi
"""

[tasks."reference-drift:env-var"]
description = "Check for drift in generated environment variables reference"
depends = ["reference:env-var"]
run = """
#!/usr/bin/env bash
set -euo pipefail
if ! git diff --exit-code --quiet HEAD ./docs/reference/environment-variables/ ; then
    echo "Drift detected in the generated environment variables reference."
    echo "Run 'mise run reference:env-var' and commit the modified files."
    exit 1
fi
"""

[tasks."reference-drift:config"]
description = "Check for drift in generated config reference"
depends = ["reference:config"]
run = """
#!/usr/bin/env bash
set -euo pipefail
if ! git diff --exit-code --quiet HEAD ./docs/reference/configuration/ ; then
    echo "Drift detected in the generated config reference."
    echo "Run 'mise run reference:config' and commit the modified files."
    exit 1
fi
"""

[tasks."reference-drift:linter-rules"]
description = "Check for drift in generated linter rules reference"
depends = ["reference:linter-rules"]
run = """
#!/usr/bin/env bash
set -euo pipefail
if ! git diff --exit-code --quiet HEAD ./docs/reference/linter-rules/ ; then
    echo "Drift detected in the linter rules reference."
    echo "Run 'mise run reference:linter-rules' and commit the modified files."
    exit 1
fi
"""

[tasks."serve-docs"]
description = "Serve docs with live reload for development"
run = "mkdocs serve -f mkdocs.yml"

# =============================================================================
# INTEGRATION TESTING
# =============================================================================

[tasks."test-env-up"]
description = "Start Grafana + MySQL test environment"
run = """
#!/usr/bin/env bash
set -euo pipefail
echo "Starting test environment..."
docker-compose up -d
echo "Waiting for services to be healthy..."
for i in {1..30}; do
    if docker-compose ps | grep -q "healthy"; then
        echo "Services are healthy!"
        echo ""
        echo "Grafana is available at: http://localhost:3000"
        echo "Credentials: admin/admin"
        echo ""
        echo "Test with: mise run test-env-status"
        exit 0
    fi
    echo -n "."
    sleep 1
done
echo ""
echo "Warning: Services may still be starting up. Check with: docker-compose ps"
"""

[tasks."test-env-down"]
description = "Stop and remove the test environment"
run = """
echo "Stopping test environment..."
docker-compose down
"""

[tasks."test-env-clean"]
description = "Stop the test environment and remove all volumes"
run = """
echo "Stopping test environment and removing volumes..."
docker-compose down -v
"""

[tasks."test-env-status"]
description = "Show status of test environment services"
run = "docker-compose ps"

[tasks."test-env-logs"]
description = "Show logs from the test environment"
run = "docker-compose logs -f"
