version: "2"

run:
  go: "1.26"
  modules-download-mode: vendor

linters:
  default: all
  disable:
    - cyclop
    - err113
    - exhaustive
    - exhaustruct
    - funcorder
    - funlen
    - gocognit
    - goconst
    - godoclint
    - godox
    - ireturn
    - lll
    - mnd
    - nlreturn
    - noinlineerr
    - paralleltest
    - tagalign
    - tagliatelle
    - varnamelen
    - wrapcheck
    - wsl
    - wsl_v5

  settings:
    errcheck:
      exclude-functions:
        - fmt:.*
    revive:
      rules:
        - name: var-naming
          disabled: true
    depguard:
      rules:
        debug_tools:
          deny:
            - pkg: "github.com/davecgh/go-spew"
              desc: debug statements should be removed

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Taint-analysis rules produce too many false positives for CLI tools
      # that intentionally handle user-controlled paths and URLs.
      - linters: [gosec]
        text: "G702|G703|G704"
      # Test data containing "token"/"credential" keys is not a real secret,
      # and marshaling test fixtures that include secret-pattern fields is fine.
      - linters: [gosec]
        text: "G101|G117"
        path: "_test\\.go$"
      # uintptr→int for term.GetSize / term.IsTerminal is the standard Go pattern.
      - linters: [gosec]
        text: "G115"
        path: "(terminal|graph)/.*\\.go$"
      # Build scripts: parser.ParseDir works fine; go/packages is overkill here.
      - linters: [staticcheck]
        text: "SA1019.*ParseDir"
        path: "^scripts/"

formatters:
  enable:
    - gci
    - gofmt
    - goimports
  exclusions:
    generated: lax
